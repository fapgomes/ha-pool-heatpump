name: Pool Heat Pump (Modbus bridge)
version: "1.0.0"
slug: pool_heatpump
description: Local bridge for AquaTemp/fzdbiology-family pool heat pumps (Neoboost, POOL COMFORT, DOTELS-SWP…) to Home Assistant via MQTT — no cloud
url: https://github.com/fapgomes/ha-pool-heatpump
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
init: false
host_network: false
ports:
  8502/tcp: 8502
ports_description:
  8502/tcp: Port the heat pump's WiFi/serial module connects to (TCP Client)
services:
  - mqtt:need
options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
schema:
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
