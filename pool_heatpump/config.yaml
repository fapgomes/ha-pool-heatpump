name: Pool Heat Pump (Modbus bridge)
version: "1.2.0"
slug: pool_heatpump
description: Local bridge for AquaTemp/fzdbiology-family pool heat pumps (Neoboost, POOL COMFORT, DOTELS-SWP…) to Home Assistant via MQTT — no cloud
url: https://github.com/fapgomes/ha-pool-heatpump
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
init: false
# Host network is needed so the add-on can reach the pump's WiFi module on the
# LAN (UDP 48899 discovery) for the Adopt/Restore buttons, and so the pump can
# connect to port 8502 directly on the host.
host_network: true
# Needed so bashio can read the add-on options and the MQTT service from the
# Supervisor API (otherwise every API call is "forbidden").
hassio_api: true
services:
  - mqtt:need
options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  module_ip: ""
  bridge_host: ""
  cloud_host: "www.fzdbiology.com"
  cloud_port: 502
schema:
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
  module_ip: str?
  bridge_host: str?
  cloud_host: str?
  cloud_port: port?
